[build]
build_dir = "./_site"
templates_dir = "./templates"
static_dir = "./static"

[layout]
# Whether the top-level sections (Research, Projects, etc.) start collapsed.
sections_collapsed = true

[overview]
name = "Greg Pauloski"
titles = ["Computer Scientist", "Software Engineer"]
topics = ["High-Performance Computing", "Artificial Intelligence", "Distributed Systems"]
headshot = "images/headshot.jpg"
contacts = [
    { name = "email", link = "mailto:jgpauloski@uchicago.edu" },
    { name = "github", link = "https://github.com/gpauloski" },
    { name = "linkedin", link = "https://www.linkedin.com/in/gregorypauloski/" },
    { name = "scholar", link = "https://scholar.google.com/citations?user=rek2K4EAAAAJ&hl=en" },
]
analytics = "G-RP37QLH20F"
source = "https://github.com/gpauloski/gpauloski.github.io/"
text = """
Hello there!
I recently completed my Ph.D. in Computer Science with <a href="https://labs.globus.org" target="_blank">Globus Labs</a> at the <a href="https://cs.uchicago.edu/" target="_blank">University of Chicago</a>,
where I was co-advised by <a href="https://cs.uchicago.edu/people/ian-foster/" target="_blank">Ian Foster</a> and <a href="https://kylechard.com/" target="_blank">Kyle Chard</a>.
My research spans high-performance computing, distributed systems, and deep learning frameworks.
I completed my Bachelors in Computer Science at the <a href="https://cs.utexas.edu/" target="_blank">University of Texas at Austin</a> and previously worked at Apple, Google, and the Texas Advanced Computing Center.
"""

[research]
intro = """
These are the areas I focused on during my Ph.D. and earlier research &mdash; topics I know deeply.
Consider this an archive of that work rather than a list of what I am actively pursuing today.
"""
sections = [
    { name = "Distributed Systems", text = "Designed programming paradigms that decoupled communication from application design, letting applications select data movement methods based on <i>where</i> data are moved, <i>what</i> is moved, or <i>when</i> it is moved. These abstractions power scalable scientific workflows, federated function-as-a-service platforms, and multi-agent systems." },
    { name = "Scalable Deep Learning", text = "Built techniques that reduced deep learning training time and improved scalability: scalable second-order optimization, hardware-adaptive tuning of computation and communication, gradient compression to cut communication overheads, and hierarchical federated learning across heterogeneous hardware." },
    { name = "AI for Science", text = "Trained large (billion+ parameter) transformer language models on broad scientific literature to automate knowledge extraction, built frameworks for coupling AI with simulations on exascale supercomputers, and delivered large-scale solutions to challenges in genome evolution, next-generation battery design, and carbon capture." },
]

[projects]
github = "https://github.com/gpauloski/"
links = [
    { name = "Academy", link = "https://docs.academy-agents.org", description = "Build and deploy stateful agents across federated resources" },
    { name = "K-FAC", link = "https://github.com/gpauloski/kfac-pytorch", description = "Distributed PyTorch K-FAC gradient preconditioner" },
    { name = "ProxyStore", link = "https://github.com/proxystore/proxystore", description = "Pass-by-reference semantics for distributed Python applications" },
    { name = "TaPS", link = "https://github.com/proxystore/taps", description = "Benchmarking suite for distributed/parallel task executors" },
    { name = "Colmena", link = "https://github.com/exalearn/colmena", description = "Steering large campaigns of simulations on HPC with AI" },
    { name = "3pseatBot", link = "https://github.com/gpauloski/3pseatBot", description = "A hobby Discord bot" },
]

[publications]
bibtex = "publications/pauloski.bib"
publications_dir = "./config/publications"

[presentations]
presentations_dir = "./config/presentations"

[theses]
theses_dir = "./config/theses"
