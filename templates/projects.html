{% import 'icons.html' as icons %}
<div class="projects">
{% for project in config.projects.links %}
    <a class="proj" href="{{ project.link }}">
        <div class="pt">{{ project.name }} <span class="arrow">{{ icons.icon('arrow-up-right') }}</span></div>
        <div class="pd">{{ project.description }}</div>
    </a>
{% endfor %}
</div>
